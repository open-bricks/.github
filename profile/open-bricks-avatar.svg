<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Subtle drop shadow for the hovering orange block -->
    <filter id="hover-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#F97316" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#FFFFFF"/>
  
  <!-- Logo Group -->
  <g transform="translate(100, 114)">
    <!-- Row 4 (Base) -->
    <rect x="0" y="150" width="120" height="40" rx="8" fill="#2563EB"/>
    <rect x="130" y="150" width="70" height="40" rx="8" fill="#2563EB"/>
    
    <!-- Row 3 -->
    <rect x="0" y="100" width="60" height="40" rx="8" fill="#2563EB"/>
    <rect x="140" y="100" width="60" height="40" rx="8" fill="#2563EB"/>
    
    <!-- Row 2 -->
    <rect x="0" y="50" width="60" height="40" rx="8" fill="#2563EB"/>
    <rect x="140" y="50" width="60" height="40" rx="8" fill="#2563EB"/>
    
    <!-- Row 1 (Top) -->
    <rect x="0" y="0" width="70" height="40" rx="8" fill="#2563EB"/>
    
    <!-- Hovering Orange Block -->
    <rect x="80" y="-18" width="120" height="40" rx="8" fill="#F97316" filter="url(#hover-shadow)"/>
  </g>
</svg>
