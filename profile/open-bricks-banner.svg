<svg width="700" height="200" viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="hover-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#F97316" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="200" fill="#F8FAFC" />
  
  <!-- Logo Group Scaled and translated to left side -->
  <!-- scale is 0.6, so center is roughly at Y=48 -->
  <g transform="translate(60, 48) scale(0.6)">
    <!-- Row 4 Base -->
    <rect x="0" y="150" width="120" height="40" rx="8" fill="#2563EB"/>
    <rect x="130" y="150" width="70" height="40" rx="8" fill="#2563EB"/>
    
    <!-- Row 3 -->
    <rect x="0" y="100" width="60" height="40" rx="8" fill="#2563EB"/>
    <rect x="140" y="100" width="60" height="40" rx="8" fill="#2563EB"/>
    
    <!-- Row 2 -->
    <rect x="0" y="50" width="60" height="40" rx="8" fill="#2563EB"/>
    <rect x="140" y="50" width="60" height="40" rx="8" fill="#2563EB"/>
    
    <!-- Row 1 Top -->
    <rect x="0" y="0" width="70" height="40" rx="8" fill="#2563EB"/>
    <!-- Hovering Orange Block -->
    <rect x="80" y="-18" width="120" height="40" rx="8" fill="#F97316" filter="url(#hover-shadow)"/>
  </g>
  
  <!-- Text Group -->
  <g transform="translate(220, 105)">
    <!-- Heading -->
    <text x="0" y="0" font-family="'Inter', 'DM Sans', '-apple-system', 'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="52" fill="#1E293B" letter-spacing="-0.03em">open-bricks</text>
    <!-- Subtitle -->
    <text x="4" y="32" font-family="'Inter', 'DM Sans', '-apple-system', 'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="20" fill="#64748B" letter-spacing="0.01em">A New Open Office</text>
  </g>
</svg>
